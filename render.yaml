services:
  - type: web
    name: noor-ai-qf-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: QF_USE_PRELIVE
        value: "true"
      - key: QF_CLIENT_ID
        sync: false
      - key: QF_CLIENT_SECRET
        sync: false