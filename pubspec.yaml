name: noor_ai
description: "Noor AI – Quran Companion. An offline-first AI voice assistant for Quran interaction."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  crypto: ^3.0.7

  # Audio
  record: ^5.2.1
  just_audio: ^0.9.43
  audio_session: ^0.1.21
  permission_handler: ^11.4.0

  # Local Storage
  sqflite: ^2.4.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # FFI
  ffi: ^2.1.3

  # Vector DB
  zvec_flutter: ^0.0.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  flutter_markdown: ^0.7.6+2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  wakelock_plus: ^1.2.10
  connectivity_plus: ^6.1.4
  app_links: ^6.4.1
  url_launcher: ^6.3.2

dependency_overrides:
  record_linux: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/
    - assets/vector_db/

